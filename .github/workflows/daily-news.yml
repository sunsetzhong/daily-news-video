name: Daily News Video Generator

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      manual_trigger:
        description: '手动触发新闻视频生成'
        required: false
        default: 'true'

env:
  PYTHON_VERSION: '3.11'

jobs:
  prepare-news:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Prepare shared news payload
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        X666_API_KEY: ${{ secrets.X666_API_KEY }}
        X666_BASE_URL: https://grok.oo9.dpdns.org/v1
        X666_MODEL: grok-4-fast-expert
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      run: |
        python src/prepare_news.py

    - name: Upload prepared payload
      uses: actions/upload-artifact@v4
      with:
        name: prepared-news-${{ github.run_id }}
        path: prepared/
        retention-days: 1
        if-no-files-found: error

  generate-news-video:
    runs-on: ubuntu-latest
    needs: prepare-news
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - tts_engine: edge
            tts_voice: zh-CN-XiaoxiaoNeural
          - tts_engine: edge
            tts_voice: zh-CN-XiaoyiNeural
          - tts_engine: edge
            tts_voice: zh-CN-YunxiNeural
          - tts_engine: edge
            tts_voice: zh-CN-YunjianNeural
          - tts_engine: edge
            tts_voice: zh-CN-YunxiaNeural
          - tts_engine: edge
            tts_voice: zh-CN-XiaoxuanNeural
          - tts_engine: gtts
            tts_voice: gtts-zh-CN

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download prepared payload
      uses: actions/download-artifact@v4
      with:
        name: prepared-news-${{ github.run_id }}
        path: prepared/

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg fonts-noto-cjk fonts-noto-color-emoji
        fc-list :lang=zh

    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate news video from shared payload
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        X666_API_KEY: ${{ secrets.X666_API_KEY }}
        X666_BASE_URL: https://grok.oo9.dpdns.org/v1
        X666_MODEL: grok-4-fast-expert
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        TTS_ENGINE: ${{ matrix.tts_engine }}
        TTS_VOICE: ${{ matrix.tts_voice }}
        INPUT_SCRIPT_PATH: prepared/script.json
        INPUT_NEWS_ITEMS_PATH: prepared/news_items.json
      run: |
        SAFE_ENGINE="$(echo "${TTS_ENGINE}" | sed 's/[^a-zA-Z0-9._-]/_/g')"
        SAFE_VOICE="$(echo "${TTS_VOICE}" | sed 's/[^a-zA-Z0-9._-]/_/g')"
        export OUTPUT_DIR="output/${SAFE_ENGINE}_${SAFE_VOICE}"
        python src/main.py

        VOICE_DIR="voice_bundle/${SAFE_ENGINE}_${SAFE_VOICE}"
        mkdir -p "${VOICE_DIR}/mp4" "${VOICE_DIR}/logs"
        cp -a "${OUTPUT_DIR}/." "${VOICE_DIR}/mp4/"
        if [ -d logs ]; then
          cp -a logs/. "${VOICE_DIR}/logs/" || true
        fi

    - name: Upload voice bundle
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: voice-bundle-${{ github.run_id }}-${{ matrix.tts_engine }}-${{ matrix.tts_voice }}
        path: voice_bundle/
        retention-days: 7
        if-no-files-found: ignore

  bundle-artifacts:
    runs-on: ubuntu-latest
    needs: generate-news-video
    if: always()
    permissions:
      contents: read
      actions: write
    steps:
    - name: Download all voice bundles
      uses: actions/download-artifact@v4
      with:
        pattern: voice-bundle-${{ github.run_id }}-*
        path: aggregated/
        merge-multiple: true

    - name: Build final zip packages
      run: |
        mkdir -p final/mp4 final/logs
        find aggregated -type f -name "*.mp4" -exec cp {} final/mp4/ \;
        find aggregated -type f \( -name "*.log" -o -name "*.txt" \) -exec cp {} final/logs/ \; || true
        (cd final && zip -r all-mp4.zip mp4)
        (cd final && zip -r all-logs.zip logs)

    - name: Upload MP4 zip
      uses: actions/upload-artifact@v4
      with:
        name: all-mp4-${{ github.run_id }}
        path: final/all-mp4.zip
        retention-days: 30
        if-no-files-found: error

    - name: Upload logs zip
      uses: actions/upload-artifact@v4
      with:
        name: all-logs-${{ github.run_id }}
        path: final/all-logs.zip
        retention-days: 14
        if-no-files-found: error
